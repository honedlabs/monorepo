name: monorepo-split

on:
  push:
    branches:
      - main

jobs:
  split-monorepo:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - first-package
          - second-package

    steps:
      - uses: actions/checkout@v4

      - name: Monorepo Split of ${{ matrix.package }}
        uses: symplify/github-action-monorepo-split@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          package-directory: 'packages/laravel/${{ matrix.package }}'
          repository-organization: 'honedlabs'
          repository-name: '${{ matrix.package }}'

          user-name: "jdw5"
          user-email: "josh@joshua-wallace.com"